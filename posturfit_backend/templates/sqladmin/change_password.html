<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ganti Password — PostureFit Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/posturfit-login.css" />
  <style>
    /* ── Override card width for this page ── */
    .login-card { max-width: 460px; }
    .login-page { grid-template-columns: 1fr; }
    .login-side  { display: none; }
    .login-center { grid-column: 1; min-height: 100vh; }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
      text-decoration: none;
      margin-bottom: 28px;
      opacity: 0.8;
      transition: opacity 0.18s;
    }
    .back-link:hover { opacity: 1; }

    /* ── Success alert ── */
    .login-success {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 13px 16px;
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: var(--radius-md);
      margin-bottom: 22px;
      animation: cardIn 0.35s var(--ease-out) both;
    }
    .login-success-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .login-success-text { font-size: 13px; color: #059669; font-weight: 500; line-height: 1.45; }

    /* ── Password strength bar ── */
    .strength-wrap { margin-top: 6px; }
    .strength-bar  {
      height: 4px;
      border-radius: 4px;
      background: rgba(29,111,232,0.1);
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s ease, background 0.3s ease;
    }
    .strength-label {
      font-size: 11px;
      font-weight: 600;
      margin-top: 4px;
      color: var(--text-muted);
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-canvas" aria-hidden="true">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="bg-grid"></div>
  </div>

  <div class="login-page">
    <div class="login-center">
      <div class="login-card">

        <!-- Back link -->
        <a class="back-link" href="/admin" id="back-to-dashboard">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Kembali ke Dashboard
        </a>

        <!-- Brand -->
        <div class="login-brand">
          <div class="login-logo-wrap">
            <img src="/static/Logo_1.png" alt="PostureFit Logo" class="login-logo-img" />
            <div class="login-logo-ring" aria-hidden="true"></div>
          </div>
          <div class="login-brand-text">
            <h1>Posture<em>Fit</em></h1>
            <p>Ganti Password Admin</p>
          </div>
        </div>

        <!-- Heading -->
        <div class="login-heading">
          <h2>Ubah Password</h2>
          <p>Masukkan password saat ini lalu buat password baru untuk akun <strong>{{ username }}</strong>.</p>
        </div>

        <!-- Error Alert -->
        {% if error %}
        <div class="login-error" id="alert-error" role="alert" aria-live="assertive">
          <span class="login-error-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </span>
          <span class="login-error-text">{{ error }}</span>
        </div>
        {% endif %}

        <!-- Success Alert -->
        {% if success %}
        <div class="login-success" id="alert-success" role="status" aria-live="polite">
          <span class="login-success-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                 fill="none" stroke="#059669" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </span>
          <span class="login-success-text">{{ success }}</span>
        </div>
        {% endif %}

        <!-- Form -->
        <form class="login-form" id="cp-form" method="POST" action="/admin-cp/change-password" novalidate>

          <!-- Password Saat Ini -->
          <div class="form-group">
            <label class="form-label" for="current_password">Password Saat Ini</label>
            <div class="input-wrap">
              <span class="input-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input class="form-input" type="password" id="current_password"
                     name="current_password" placeholder="Password saat ini"
                     autocomplete="current-password" required />
              <button type="button" class="toggle-password" id="toggle-cur"
                      aria-label="Tampilkan password" title="Tampilkan password">
                <svg id="eye-cur-show" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg id="eye-cur-hide" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Password Baru -->
          <div class="form-group">
            <label class="form-label" for="new_password">Password Baru</label>
            <div class="input-wrap">
              <span class="input-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
                </svg>
              </span>
              <input class="form-input" type="password" id="new_password"
                     name="new_password" placeholder="Min. 8 karakter"
                     autocomplete="new-password" required />
              <button type="button" class="toggle-password" id="toggle-new"
                      aria-label="Tampilkan password" title="Tampilkan password">
                <svg id="eye-new-show" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg id="eye-new-hide" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
            <!-- Strength bar -->
            <div class="strength-wrap" id="strength-wrap" style="display:none">
              <div class="strength-bar">
                <div class="strength-fill" id="strength-fill"></div>
              </div>
              <div class="strength-label" id="strength-label"></div>
            </div>
          </div>

          <!-- Konfirmasi Password Baru -->
          <div class="form-group">
            <label class="form-label" for="confirm_password">Konfirmasi Password Baru</label>
            <div class="input-wrap">
              <span class="input-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="9 11 12 14 22 4"/>
                  <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                </svg>
              </span>
              <input class="form-input" type="password" id="confirm_password"
                     name="confirm_password" placeholder="Ulangi password baru"
                     autocomplete="new-password" required />
              <button type="button" class="toggle-password" id="toggle-conf"
                      aria-label="Tampilkan password" title="Tampilkan password">
                <svg id="eye-conf-show" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg id="eye-conf-hide" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Submit -->
          <button class="btn-login" type="submit" id="btn-submit">
            <span class="btn-content">
              <span class="btn-spinner" id="btn-spinner" aria-hidden="true"></span>
              <span id="btn-text">Simpan Password Baru</span>
            </span>
          </button>

        </form>

        <!-- Footer -->
        <div class="login-footer">
          <div class="footer-status">
            <span class="status-dot" aria-hidden="true"></span>
            Sistem online
          </div>
          <span class="footer-version">v2.0.0</span>
        </div>

      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      /* ── Toggle password visibility helper ── */
      function makeToggle(btnId, inputId, showId, hideId) {
        var btn    = document.getElementById(btnId);
        var input  = document.getElementById(inputId);
        var iShow  = document.getElementById(showId);
        var iHide  = document.getElementById(hideId);
        var vis    = false;
        if (!btn || !input) return;
        btn.addEventListener('click', function () {
          vis        = !vis;
          input.type = vis ? 'text' : 'password';
          if (iShow) iShow.style.display = vis ? 'none' : '';
          if (iHide) iHide.style.display = vis ? ''     : 'none';
          btn.title = vis ? 'Sembunyikan password' : 'Tampilkan password';
          btn.setAttribute('aria-label', btn.title);
        });
      }

      makeToggle('toggle-cur',  'current_password', 'eye-cur-show',  'eye-cur-hide');
      makeToggle('toggle-new',  'new_password',      'eye-new-show',  'eye-new-hide');
      makeToggle('toggle-conf', 'confirm_password',  'eye-conf-show', 'eye-conf-hide');

      /* ── Password strength meter ── */
      var newPwInput     = document.getElementById('new_password');
      var strengthWrap   = document.getElementById('strength-wrap');
      var strengthFill   = document.getElementById('strength-fill');
      var strengthLabel  = document.getElementById('strength-label');

      var levels = [
        { label: 'Sangat Lemah', color: '#ef4444', w: '20%' },
        { label: 'Lemah',        color: '#f97316', w: '40%' },
        { label: 'Cukup',        color: '#eab308', w: '60%' },
        { label: 'Kuat',         color: '#22c55e', w: '80%' },
        { label: 'Sangat Kuat',  color: '#10b981', w: '100%' },
      ];

      function calcStrength(pw) {
        var score = 0;
        if (pw.length >= 8)  score++;
        if (pw.length >= 12) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;
        return Math.min(score, 4);
      }

      if (newPwInput) {
        newPwInput.addEventListener('input', function () {
          var val = newPwInput.value;
          if (!val) { strengthWrap.style.display = 'none'; return; }
          strengthWrap.style.display = 'block';
          var lvl = levels[calcStrength(val)];
          strengthFill.style.width      = lvl.w;
          strengthFill.style.background = lvl.color;
          strengthLabel.textContent     = lvl.label;
          strengthLabel.style.color     = lvl.color;
        });
      }

      /* ── Loading state on submit ── */
      var form      = document.getElementById('cp-form');
      var spinner   = document.getElementById('btn-spinner');
      var btnText   = document.getElementById('btn-text');
      var btnSubmit = document.getElementById('btn-submit');

      if (form) {
        form.addEventListener('submit', function () {
          var cur  = document.getElementById('current_password').value;
          var nw   = document.getElementById('new_password').value;
          var conf = document.getElementById('confirm_password').value;
          if (!cur || !nw || !conf) return;
          if (spinner)   spinner.style.display  = 'block';
          if (btnText)   btnText.textContent    = 'Menyimpan…';
          if (btnSubmit) btnSubmit.disabled     = true;
        });
      }

      /* ── Auto-dismiss error after 6 s ── */
      var errEl = document.getElementById('alert-error');
      if (errEl) {
        setTimeout(function () {
          errEl.style.transition = 'opacity 0.5s';
          errEl.style.opacity    = '0';
          setTimeout(function () { errEl.style.display = 'none'; }, 500);
        }, 6000);
      }
    })();
  </script>

</body>
</html>
